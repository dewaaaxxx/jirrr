name: Ekstrak ZIP dan Simpan ke Repo

on:
  workflow_dispatch:  # Hanya manual trigger

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Cari dan ekstrak semua file ZIP
      run: |
        echo "🔍 Mencari file ZIP..."
        find . -name "*.zip" -type f | while read zipfile; do
          echo "📦 Mengekstrak: $zipfile"
          unzip -o "$zipfile" -d "$(dirname "$zipfile")"
          rm -f "$zipfile"  # Hapus ZIP setelah ekstrak (opsional)
        done

    - name: Commit dan push hasil ekstrak
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto ekstrak file ZIP [skip ci]"
        git push
